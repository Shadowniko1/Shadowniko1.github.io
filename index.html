<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleepy Notes - Download</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero-section">
        <h1 class="main-title">Sleepy Notes</h1>
        
        <a href="https://github.com/Shadowniko1/Notes-app/releases/download/gui/installer.exe" 
           id="install-btn" 
           class="install-btn">
           INSTALL
        </a>
        
        <p id="thanks-message" class="thanks-text hidden">Thanks for installing!</p>
        
        <div class="scroll-indicator">
            <span>Scrollen für Screenshots</span>
            <div class="arrow">↓</div>
        </div>
    </header>

    <main class="screenshot-section">
        <h2>App Screenshots</h2>
        <div class="image-container">
            <img src="dashboard.png" alt="Sleepy Notes Dashboard" class="app-screenshot">
            <img src="editor.png" alt="Sleepy Notes Editor" class="app-screenshot">
        </div>
    </main>

    <script>
        // JavaScript direkt integriert, da es nur ein paar Zeilen sind:
        const installBtn = document.getElementById('install-btn');
        const thanksMessage = document.getElementById('thanks-message');

        installBtn.addEventListener('click', () => {
            // Zeigt den Dankestext an, sobald der Button geklickt wird
            thanksMessage.classList.remove('hidden');
        });
    </script>
</body>
</html>
